# Strix Halo workstation — VM tuning for Strix Halo APU
# BIOS UMA: 1GB dedicated VRAM (minimum available)
# GTT: 128GB auto-sized by amdgpu on kernel 6.19.14+ (no boot param needed)
# System pool: ~127GB (GPU accesses entire memory pool dynamically via GTT)
# Tuned for ML training + LLM inference workloads

# Memory compaction — REQUIRED for unified-memory APU (per AMD MI300A guide).
# Without this, the GPU's TTM allocator hits page-allocation failures during
# heavy bursts (mid-training eval) even when 90%+ system RAM is free, because
# the page allocator's free-list is fragmented and can't satisfy contiguous
# requests. Proactive compaction keeps the free-list consolidated.
vm.compaction_proactiveness=20
vm.compact_unevictable_allowed=1

# Moderate swapping — 127GB system pool has generous headroom
vm.swappiness=10

# Dirty page writeback — use absolute bytes, NOT ratios
# Ratios get reset by kernel when amdgpu recalculates available memory
# 6.4GB dirty limit (~5% of system pool), 1.9GB background writeback (~1.5%)
vm.dirty_bytes=6871947674
vm.dirty_background_bytes=2040109466

# Reserve 1GB free for GPU driver / kernel allocations
# APU needs headroom for SVM mappings even with large GTT
vm.min_free_kbytes=1048576

# Allow generous virtual memory mapping for PyTorch/ROCm
vm.max_map_count=2097152

# Reduce vfs cache pressure — keep dentries/inodes in memory
vm.vfs_cache_pressure=50

# Overcommit: heuristic mode (default) is fine for ML workloads
vm.overcommit_memory=0

# Network tuning for large model/audio transfers
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.core.rmem_default=1048576
net.core.wmem_default=1048576
net.ipv4.tcp_rmem=4096 1048576 16777216
net.ipv4.tcp_wmem=4096 1048576 16777216

# TCP congestion control — BBR for better bandwidth utilization
net.ipv4.tcp_congestion_control=bbr
net.core.default_qdisc=fq

# Scheduler — disable autogroup for dedicated ML workstation
kernel.sched_autogroup_enabled=0

# Profiling — allow non-root hardware perf counters
kernel.perf_event_paranoid=1

# Disable NMI watchdog — free a hardware perf counter
kernel.nmi_watchdog=0

# Increase backlog for 2.5 Gbps burst handling
net.core.netdev_max_backlog=5000

# TCP Fast Open — client + server (llama-server, analyzer, dashboards)
net.ipv4.tcp_fastopen=3

# TCP MTU probing — discover optimal path MTU
net.ipv4.tcp_mtu_probing=1
